baseURL = "https://brice6.pages.dev/"
title = "Brice's Blog"
theme = "PaperMod"

# --------------------
# 基础设置
# --------------------
defaultContentLanguage = "en"
defaultContentLanguageInSubdir = false
enableRobotsTXT = true

[pagination]
  pagerSize = 10

# --------------------
# 全局参数
# --------------------
[params]
  env = "production"
  author = "Brice"
  homeTitle = "Brice | AI Systems, Mathematics, Computer Science and Quant Blog"
  description = "Notes on AI, systems, Rust, C/C++, Zig, Python and quantitative research."
  keywords = ["AI", "Systems", "Rust", "C++", "Python", "Zig", "Quant", "Algorithms", "Mathematics"]
  images = ["images/avatar-320.webp"]
  defaultTheme = "auto"
  ShowPostNavLinks = true

  showReadingTime = true
  showWordCount = true
  showCodeCopyButtons = true   # useful for code alongside math
  showBreadCrumbs = true
  showToc = true
  tocOpen = true               # open by default — math posts are long

  mainSections = ["posts"]

  # --------------------
  # 首页：Profile 模式
  # --------------------
  [params.profileMode]
  enabled = true
  title = "Brice"
  subtitle = "AI · Systems · Quant · C/C++ · Rust · Python · Zig"
  imageUrl = "images/avatar-320.webp"
  imageWidth = 160
  imageHeight = 160
  showPosts = false

  [[params.profileMode.buttons]]
    name = "Blog"
    url = "/posts/"

  [[params.profileMode.buttons]]
    name = "About"
    url = "/about/"

  [params.social]
  twitter = "Bricelucifer"

  [params.schema]
  personName = "Brice"
  personImage = "images/avatar-320.webp"
  sameAs = [
    "https://github.com/BriceLucifer",
    "https://x.com/Bricelucifer",
  ]

# --------------------
# 社交链接
# --------------------
[[params.socialIcons]]
  name = "github"
  url  = "https://github.com/BriceLucifer"

[[params.socialIcons]]
  name = "twitter"
  url  = "https://x.com/Bricelucifer"

[[params.socialIcons]]
  name = "email"
  url  = "mailto:2376671337@qq.com"

[[params.socialIcons]]
  name = "rss"
  url  = "/index.xml"

# --------------------
# 站点图标
# --------------------
[params.assets]
  favicon = "favicon.ico"
  favicon16x16 = "favicon-16x16.png"
  favicon32x32 = "favicon-32x32.png"
  apple_touch_icon = "apple-touch-icon.png"

# --------------------
# Markdown & 高亮
# --------------------
[markup]
  [markup.goldmark.renderer]
    unsafe = true

  [markup.goldmark.parser]
    autoHeadingID = true

  [markup.goldmark.extensions]
    typographer = false        # keep off — typographer mangles LaTeX quotes

  [markup.goldmark.extensions.passthrough]
    enable = true
    [markup.goldmark.extensions.passthrough.delimiters]
      block  = [["$$", "$$"], ["\\[", "\\]"]]
      inline = [["$", "$"],   ["\\(", "\\)"]]

  [markup.highlight]
    noClasses = false
    guessSyntax = true
    lineNos = true
    lineNumbersInTable = true
    style = "dracula"          # higher contrast, easier to read alongside white math

# --------------------
# 分类系统
# --------------------
[taxonomies]
  tag = "tags"
  category = "categories"

# --------------------
# 输出（搜索需要 JSON）
# --------------------
[outputs]
  home = ["HTML", "RSS", "JSON"]

# --------------------
# 菜单
# --------------------
[languages]
  [languages.en]
    languageName = "English"
    weight = 1

    [[languages.en.menu.main]]
      name = "Home"
      url = "/"
      weight = 1

    [[languages.en.menu.main]]
      name = "Blog"
      url = "/posts/"
      weight = 2

    [[languages.en.menu.main]]
      name = "Tags"
      url = "/tags/"
      weight = 4

    [[languages.en.menu.main]]
      name = "About"
      url = "/about/"
      weight = 5
