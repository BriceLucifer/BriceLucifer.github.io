{{- /* ── Math (KaTeX) ──────────────────────────────────────────── */ -}}
{{- if or .Params.math .Site.Params.math }}
{{ partial "math.html" . }}
<style>
  /* display-mode equations scroll horizontally on narrow screens */
  .katex-display { overflow-x: auto; overflow-y: hidden; padding: 0.25em 0; }
  /* tighten spacing between consecutive display blocks */
  .katex-display + .katex-display { margin-top: -0.5em; }
  /* slightly larger inline math for readability */
  .katex { font-size: 1.05em; }
</style>
{{- end }}

{{- /* ── Mermaid diagrams ────────────────────────────────────── */ -}}
{{- if .Params.mermaid }}
<script type="module">
  import mermaid from 'https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.esm.min.mjs';
  mermaid.initialize({ startOnLoad: true, theme: 'default' });
</script>
{{- end }}
